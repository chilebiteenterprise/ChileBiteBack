version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chilebite_db
    restart: always
    environment:
      POSTGRES_DB: chilebite_local
      POSTGRES_USER: chilebite_user
      POSTGRES_PASSWORD: chilebite_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
